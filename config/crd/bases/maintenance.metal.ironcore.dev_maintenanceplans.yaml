                format: int64
                type: integer
              phase:
                description: Phase is the high-level state of this plan.
                enum:
                - Pending
                - Active
                - Completed
                - Failed
                type: string
              succeededRuns:
                description: SucceededRuns is the number of runs that completed successfully.
                format: int32
                type: integer
              totalRuns:
                description: TotalRuns is the total number of MaintenancePlanRuns
