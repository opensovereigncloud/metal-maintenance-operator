                          properties:
                            image:
                              description: Image specifies the image to use to upgrade
                                to the given BIOS version.
                              properties:
                                URI:
                                  description: URI is the URI of the software image
                                    to install.
                                  type: string
                                secretRef:
                                  description: SecretRef is a reference to the Secret
                                    containing the credentials to access the image
                                    URI.
                                  properties:
                                    name:
                                      description: name is unique within a namespace
                                        to reference a secret resource.
                                      type: string
                                    namespace:
                                      description: namespace defines the space within
                                        which the secret name must be unique.
                                      type: string
                                  type: object
                                  x-kubernetes-map-type: atomic
                                transferProtocol:
                                  description: TransferProtocol is the network protocol
                                    used to retrieve the image URI.
                                  type: string
                              required:
                              - URI
                              type: object
                            retryPolicy:
                              description: RetryPolicy defines the retry behavior
                                for automatic retries on transient failures.
                              properties:
                                maxAttempts:
                                  description: |-
