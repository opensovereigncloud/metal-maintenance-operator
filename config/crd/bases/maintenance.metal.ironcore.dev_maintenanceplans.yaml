                                    If not set, the operator-level default is used.
                                  format: int32
                                  maximum: 10
                                  minimum: 0
                                  type: integer
                              type: object
                            serverMaintenancePolicy:
                              description: ServerMaintenancePolicy is a maintenance
                                policy to be enforced on the server.
                              type: string
                            updatePolicy:
                              description: UpdatePolicy indicates whether the server's
                                upgrade service should bypass vendor update policies.
                              type: string
                            version:
                              description: Version specifies the BIOS version to upgrade
                                to.
                              type: string
                          required:
                          - image
                          - version
                          type: object
                        bmcSettings:
                          description: BMCSettings is the template used when Kind
                            is BMCSettings.
                          properties:
                            retryPolicy:
                              description: RetryPolicy defines automatic retry behaviour
                                on transient failures.
                              properties:
                                maxAttempts:
                                  description: |-
                                    MaxAttempts is the maximum number of automatic retry attempts after failure.
                                    0 means no automatic retries. Must be between 0 and 10 inclusive.
                                    If not set, the operator-level default is used.
                                  format: int32
                                  maximum: 10
                                  minimum: 0
                                  type: integer
                              type: object
                            serverMaintenancePolicy:
                              description: ServerMaintenancePolicy is the maintenance
                                policy to apply on affected servers.
                              type: string
                            settings:
                              additionalProperties:
                                type: string
                              description: Settings contains BMC settings as a key/value
                                map.
                              type: object
                            version:
                              description: Version specifies the BMC firmware version
                                for which the settings apply.
                              type: string
                          required:
                          - version
                          type: object
                        bmcVersion:
                          description: BMCVersion is the template used when Kind is
                            BMCVersion.
                          properties:
                            image:
                              description: Image specifies the image to use to upgrade
                                to the given BMC version.
                              properties:
                                URI:
                                  description: URI is the URI of the software image
