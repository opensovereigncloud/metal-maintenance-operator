                        create for this stage.
                      enum:
                      - BMCSettings
                      - BMCVersion
                      - BIOSSettings
                      - BIOSVersion
                      type: string
                    name:
                      description: Name is the unique identifier for this stage within
                        the plan.
                      maxLength: 253
                      minLength: 1
                      type: string
                    template:
                      description: Template contains the spec payload for the child
                        CR.
                      properties:
                        biosSettings:
                          description: BIOSSettings is the template used when Kind
                            is BIOSSettings.
                          properties:
                            retryPolicy:
                              description: RetryPolicy defines the retry behavior
                                for automatic retries on transient failures.
                              properties:
                                maxAttempts:
                                  description: |-
                                    MaxAttempts is the maximum number of automatic retry attempts after failure.
                                    0 means no automatic retries. Must be between 0 and 10 inclusive.
                                    If not set, the operator-level default is used.
                                  format: int32
                                  maximum: 10
                                  minimum: 0
                                  type: integer
                              type: object
                            serverMaintenancePolicy:
                              description: ServerMaintenancePolicy is a maintenance
                                policy to be enforced on the server.
                              type: string
                            settingsFlow:
                              description: SettingsFlow contains the BIOS settings
                                sequence to apply in the given order.
                              items:
                                properties:
                                  name:
                                    description: Name is the name of the flow item.
                                    maxLength: 1000
                                    minLength: 1
                                    type: string
                                  priority:
                                    description: Priority defines the order of applying
                                      the settings. Lower numbers have higher priority
                                      (i.e. lower numbers are applied first).
                                    format: int32
                                    maximum: 2147483645
                                    minimum: 1
                                    type: integer
                                  settings:
                                    additionalProperties:
                                      type: string
                                    description: Settings contains software (e.g.
                                      BIOS, BMC) settings as a map.
                                    type: object
                                required:
                                - name
                                - priority
                                type: object
                              type: array
                            version:
                              description: Version specifies the software version
                                (e.g. BIOS, BMC) these settings apply to.
                              type: string
                          required:
                          - version
                          type: object
                        biosVersion:
                          description: BIOSVersion is the template used when Kind
