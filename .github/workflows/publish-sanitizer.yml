name: Build and Publish Sanitizer Image
on:
  release:
    types:
    - published
  push:
    branches:
    - main
    tags:
    - v*
    paths-ignore:
    - 'docs/**'
    - '**/*.md'
  pull_request:
    paths-ignore:
    - 'docs/**'
    - '**/*.md'
    types: [labeled, unlabeled, opened, synchronize, reopened]

jobs:
  publish:
    # Condition: Run on push to main, published release, OR PR with 'ok-to-image' label
    if: |
      github.event_name == 'push' || 
      (github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'ok-to-image')) ||
      (github.event_name == 'release' && github.event.action == 'published')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      IMAGE: ghcr.io/${{ github.repository_owner }}/sanitizer
      KERNEL_VERSION: 6.12.90-2-cloud

    steps:
    - name: Clone the code
      uses: actions/checkout@v7

    - name: Login to GitHub Container Registry
      uses: docker/login-action@v4
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Setup Go
      uses: actions/setup-go@v6
      with:
        go-version-file: go.mod

    - name: Build and push
      run: |
        cd sanitizer
        
        go install github.com/u-root/u-root@v0.16.0
        go install github.com/ironcore-dev/ironcore-image/cmd/ironcore-image@v0.5.0
        ( cd hack/kernel && go install . )
        
        ./hack/build.sh \
          -k "$KERNEL_VERSION" \
          -m failover -m net_failover -m virtio_net -m virtio_blk \
          -o ./bin/initramfs.cpio
        
        ironcore-image build \
          --tag "${IMAGE}:${{ github.sha }}" \
          --config "arch=amd64,initramfs=./bin/initramfs.cpio,kernel=$(kernel use "$KERNEL_VERSION" --dir ./bin -f path)/vmlinuz"
        
        if [[ "${{ github.event_name }}" != 'pull_request' ]]; then
          ironcore-image push "${IMAGE}:${{ github.sha }}"
        fi