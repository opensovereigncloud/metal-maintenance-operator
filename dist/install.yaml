apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: consoles.maintenance.metal.ironcore.dev
spec:
  group: maintenance.metal.ironcore.dev
  names:
    kind: Console
    listKind: ConsoleList
    plural: consoles
    singular: console
  scope: Namespaced
  versions:
  - name: v1alpha1
    schema:
      openAPIV3Schema:
        description: Console is the Schema for the consoles API.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: ConsoleSpec defines the desired state of Console.
            properties:
              bmcCredentialSecretRef:
                description: BMCCredentialSecretRef references the secret containing
                  BMC credentials.
                properties:
                  name:
                    default: ""
                    description: |-
                      Name of the referent.
                      This field is effectively required, but due to backwards compatibility is
                      allowed to be empty. Instances of this type with an empty value here are
                      almost certainly wrong.
                      More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names
                    type: string
                type: object
                x-kubernetes-map-type: atomic
              consoleURL:
                description: ConsoleURL is the URL of the server management console.
                type: string
              manufacturer:
                description: Manufacturer is the manufacturer of the server management
                  console (e.g., "Dell", "HPE", "Lenovo").
                type: string
              serverSelector:
                description: ServerSelector specifies a label selector to identify
                  the servers that are to be selected.
                properties:
                  matchExpressions:
                    description: matchExpressions is a list of label selector requirements.
                      The requirements are ANDed.
                    items:
                      description: |-
                        A label selector requirement is a selector that contains values, a key, and an operator that
                        relates the key and values.
                      properties:
                        key:
                          description: key is the label key that the selector applies
                            to.
                          type: string
                        operator:
                          description: |-
                            operator represents a key's relationship to a set of values.
                            Valid operators are In, NotIn, Exists and DoesNotExist.
                          type: string
                        values:
                          description: |-
                            values is an array of string values. If the operator is In or NotIn,
                            the values array must be non-empty. If the operator is Exists or DoesNotExist,
                            the values array must be empty. This array is replaced during a strategic
                            merge patch.
                          items:
                            type: string
                          type: array
                          x-kubernetes-list-type: atomic
                      required:
                      - key
                      - operator
                      type: object
                    type: array
                    x-kubernetes-list-type: atomic
                  matchLabels:
                    additionalProperties:
                      type: string
                    description: |-
                      matchLabels is a map of {key,value} pairs. A single {key,value} in the matchLabels
                      map is equivalent to an element of matchExpressions, whose key field is "key", the
                      operator is "In", and the values array contains only "value". The requirements are ANDed.
                    type: object
                type: object
                x-kubernetes-map-type: atomic
            required:
            - consoleURL
            - manufacturer
            - serverSelector
            type: object
          status:
            description: ConsoleStatus defines the observed state of Console.
            properties:
              managedServers:
                description: ManagedServers number of managed servers.
                format: int32
                type: integer
              pendingOperations:
                description: PendingOperations tracks in-flight vendor operations.
                items:
                  description: PendingOperation tracks an in-flight vendor operation.
                  properties:
                    hostname:
                      description: Hostname is the DNS name used for the server in
                        the vendor console.
                      type: string
                    ip:
                      description: IP is the BMC IP address of the server.
                      type: string
                    jobId:
                      description: JobID is the vendor-specific job identifier for
                        tracking.
                      type: string
                    lastChecked:
                      description: LastChecked is when the job status was last polled.
                      format: date-time
                      type: string
                    message:
                      description: Message provides human-readable status information.
                      type: string
                    operationType:
                      description: OperationType is the type of operation (Import
                        or Remove).
                      type: string
                    retryCount:
                      description: RetryCount tracks how many times the operation
                        has been retried.
                      format: int32
                      type: integer
                    serverName:
                      description: ServerName is the name of the Server resource.
                      type: string
                    startTime:
                      description: StartTime is when the operation was initiated.
                      format: date-time
                      type: string
                    status:
                      description: Status is the current status of the operation.
                      type: string
                  required:
                  - hostname
                  - ip
                  - operationType
                  - serverName
                  - startTime
                  - status
                  type: object
                type: array
              totalServers:
                description: TotalServers total number of servers.
                format: int32
                type: integer
              unmanagedServers:
                description: UnmanagedServers number of unmanaged servers.
                format: int32
                type: integer
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
